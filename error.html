<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NetAdmin — Error {{ code }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080c10; --panel: #0a1420; --border: #1a2d3d;
      --accent: #00d4ff; --accent2: #00ff88; --danger: #ff3b5c;
      --warn: #ffaa00; --text: #c8e0f0; --muted: #4a6070;
      --font-mono: 'Share Tech Mono', monospace;
      --font-main: 'Exo 2', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: var(--font-main);
      min-height: 100vh; display: flex;
      align-items: center; justify-content: center;
      overflow: hidden;
    }
    .grid-bg {
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.025) 1px, transparent 1px);
      background-size: 40px 40px; z-index: 0;
    }
    .grid-bg::after {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at center, transparent 0%, var(--bg) 70%);
    }
    .error-wrap {
      position: relative; z-index: 10;
      text-align: center; padding: 40px 20px; max-width: 480px;
    }
    .error-code {
      font-family: var(--font-mono);
      font-size: 96px; font-weight: 700; line-height: 1;
      {% if code == 403 %}color: var(--danger);{% elif code == 429 %}color: var(--warn);{% else %}color: var(--muted);{% endif %}
      text-shadow: 0 0 40px currentColor;
      margin-bottom: 16px;
    }
    .error-label {
      font-family: var(--font-mono); font-size: 11px;
      color: var(--muted); letter-spacing: 4px;
      text-transform: uppercase; margin-bottom: 24px;
    }
    .error-card {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 8px; padding: 28px; position: relative; overflow: hidden;
    }
    .error-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      {% if code == 403 %}background: var(--danger);
      {% elif code == 429 %}background: var(--warn);
      {% else %}background: var(--muted);{% endif %}
    }
    .error-msg {
      font-size: 14px; color: var(--text); margin-bottom: 24px; line-height: 1.6;
    }
    .back-btn {
      display: inline-block; padding: 10px 24px;
      font-family: var(--font-mono); font-size: 12px;
      letter-spacing: 2px; text-transform: uppercase;
      text-decoration: none; border-radius: 4px;
      transition: all 0.2s;
      {% if code == 403 %}
      color: var(--danger); border: 1px solid rgba(255,59,92,0.4);
      background: rgba(255,59,92,0.08);
      {% elif code == 429 %}
      color: var(--warn); border: 1px solid rgba(255,170,0,0.4);
      background: rgba(255,170,0,0.08);
      {% else %}
      color: var(--accent); border: 1px solid rgba(0,212,255,0.3);
      background: rgba(0,212,255,0.06);
      {% endif %}
    }
    .back-btn:hover { opacity: 0.8; }
    .error-footer {
      margin-top: 20px; font-family: var(--font-mono);
      font-size: 10px; color: var(--muted); letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="error-wrap">
    <div class="error-code">{{ code }}</div>
    <div class="error-label">
      {% if code == 403 %}// Access Denied
      {% elif code == 404 %}// Not Found
      {% elif code == 429 %}// Rate Limited
      {% else %}// System Error{% endif %}
    </div>
    <div class="error-card">
      <div class="error-msg">{{ msg }}</div>
      <a href="{{ url_for('dashboard') if session.get('user_id') else url_for('login') }}" class="back-btn">
        ← Return to {{ 'Dashboard' if session.get('user_id') else 'Login' }}
      </a>
    </div>
    <div class="error-footer">
      NETADMIN &nbsp;|&nbsp; THIS INCIDENT HAS BEEN LOGGED
    </div>
  </div>
</body>
</html>
